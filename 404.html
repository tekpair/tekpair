<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — Tekpair</title>
  <link rel="icon" type="image/svg+xml" href="/logo-icon.svg"/>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#29d4f5"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'"/>
  <noscript><link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111318;
      --cyan:      #29d4f5;
      --cyan-glow: rgba(41,212,245,0.28);
      --white:     #eef1f8;
      --off:       #9aa3b8;
      --border-md: rgba(255,255,255,0.14);
    }

    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.65;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .err {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .err-code {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 800;
      font-size: clamp(5rem, 18vw, 9rem);
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--cyan);
      margin-bottom: 1.5rem;
    }

    .err-title {
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 700;
      font-size: clamp(1.5rem, 3.5vw, 2rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 1rem;
    }

    .err-sub {
      font-size: 1.05rem;
      color: var(--off);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .err-actions {
      display: flex;
      gap: 0.85rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--cyan);
      color: #0e1117;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.85rem 1.7rem;
      border-radius: 9px;
      text-decoration: none;
      transition: opacity 0.18s, box-shadow 0.18s, transform 0.18s;
    }
    .btn-primary:hover {
      opacity: 0.88;
      box-shadow: 0 4px 24px var(--cyan-glow);
      transform: translateY(-1px);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: var(--white);
      font-size: 1rem;
      font-weight: 500;
      padding: 0.85rem 1.7rem;
      border-radius: 9px;
      border: 1.5px solid var(--border-md);
      text-decoration: none;
      transition: border-color 0.18s, color 0.18s, transform 0.18s;
    }
    .btn-outline:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      html { font-size: 16px; }
      .err-actions { flex-direction: column; align-items: stretch; }
      .btn-primary, .btn-outline { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="err">
    <h1 class="err-code">404</h1>
    <h2 class="err-title">This page does not exist.</h2>
    <p class="err-sub">The page you're looking for doesn't exist, was moved, or never made it past setup. Pick a direction below and we'll get you back online.</p>
    <div class="err-actions">
      <a href="/" class="btn-primary">Back to Home</a>
      <a href="/#booking" class="btn-outline">Book a Job</a>
    </div>
  </div>
</body>
</html>
