<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your email address was changed</title>
</head>
<body style="margin:0;padding:0;background-color:#0d0f14;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0d0f14;">
    <tr>
      <td align="center" style="padding:48px 20px 40px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <img src="https://tekpair.com/logo-email.png" width="220" height="48" alt="Tekpair" style="display:block;border:0;" />
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#181b24;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px 40px 36px;">
              <h1 style="margin:0 0 14px;font-family:Arial,sans-serif;font-size:22px;font-weight:800;color:#eef1f8;line-height:1.3;">
                Your email address was changed
              </h1>
              <p style="margin:0 0 20px;font-family:Arial,sans-serif;font-size:15px;color:#8a95b0;line-height:1.7;">
                The email address for your Tekpair account was updated.
              </p>
              <!-- Change detail -->
              <table cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td style="background-color:#13161d;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 18px;">
                    <p style="margin:0 0 6px;font-family:Arial,sans-serif;font-size:12px;color:#7f8699;line-height:1.4;">FROM</p>
                    <p style="margin:0 0 14px;font-family:Arial,sans-serif;font-size:14px;color:#8a95b0;line-height:1.4;">{{ .OldEmail }}</p>
                    <p style="margin:0 0 6px;font-family:Arial,sans-serif;font-size:12px;color:#7f8699;line-height:1.4;">TO</p>
                    <p style="margin:0;font-family:Arial,sans-serif;font-size:14px;font-weight:700;color:#eef1f8;line-height:1.4;">{{ .Email }}</p>
                  </td>
                </tr>
              </table>
              <!-- Warning strip -->
              <table cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-top:16px;">
                <tr>
                  <td style="background-color:rgba(245,78,78,0.07);border:1px solid rgba(245,78,78,0.18);border-radius:10px;padding:14px 18px;">
                    <p style="margin:0;font-family:Arial,sans-serif;font-size:13px;color:#f98c8c;line-height:1.6;">
                      If you didn't make this change, contact us immediately at
                      <a href="mailto:connor@tekpair.com" style="color:#f98c8c;">connor@tekpair.com</a>.
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding:28px 0 0;">
              <p style="margin:0 0 6px;font-family:Arial,sans-serif;font-size:12px;color:#7f8699;line-height:1.7;">
                &copy; 2026 Tekpair &middot; Cohoes, NY &middot; Capital Region
              </p>
              <p style="margin:0;font-family:Arial,sans-serif;font-size:12px;line-height:1.7;">
                <a href="mailto:connor@tekpair.com" style="color:#8a95b0;text-decoration:none;">connor@tekpair.com</a>
                &nbsp;&middot;&nbsp;
                <a href="tel:+15182796823" style="color:#8a95b0;text-decoration:none;">(518) 279-6823</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
